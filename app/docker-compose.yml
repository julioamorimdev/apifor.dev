name: apifor

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: pg
      POSTGRES_DB: apifor
    ports: ["55432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apifor"]
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    image: postgres:16
    depends_on:
      postgres: { condition: service_healthy }
    volumes: ["../contracts/sql:/sql:ro"]
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        set -e
        DB=postgresql://postgres:pg@postgres/apifor
        if [ "$$(psql "$$DB" -tAc "select to_regclass('public.plan_catalog')")" = "plan_catalog" ]; then
          echo "schema já aplicado; pulando"
          exit 0
        fi
        for f in /sql/001_schema.sql /sql/002_rls.sql /sql/003_seeds.sql /sql/004_rls_role.sql /sql/005_worker_role.sql; do
          echo "applying $$f"
          psql "$$DB" -v ON_ERROR_STOP=1 -f "$$f"
        done
        echo "migrations done"

  cerebro:
    build: ./cerebro
    environment:
      CEREBRO_ADDR: ":8080"
      CEREBRO_GRPC: ":9090"
      DATABASE_URL: "postgres://postgres:pg@postgres/apifor?sslmode=disable"
      # M6.3: pool da app (role não-superuser) p/ enforcement de RLS nos reads/writes do REST
      APP_DATABASE_URL: "postgres://apifor_app:apppw@postgres/apifor?sslmode=disable"
      # M6.5: pool primário dos workers (NOSUPERUSER, BYPASSRLS) — tira o superuser do runtime
      WORKER_DATABASE_URL: "postgres://apifor_worker:workerpw@postgres/apifor?sslmode=disable"
      JWT_SECRET: "dev-secret"
      # M3.1 enforcement — knobs de teste (encolhem 4h/36h p/ segundos). 0/ausente = produção.
      LEASE_TTL_SEC: "${LEASE_TTL_SEC:-}"
      WORKER_HOURS_CAP_SEC: "${WORKER_HOURS_CAP_SEC:-}"
      REAPER_TICK_SEC: "${REAPER_TICK_SEC:-}"
      GRACE_SEC: "${GRACE_SEC:-}"
      CEREBRO_PKI_DIR: "/var/lib/cerebro"
      # M3.2b billing (Stripe). Sem STRIPE_SECRET_KEY, checkout/portal viram stub;
      # o webhook + dunning funcionam com STRIPE_WEBHOOK_SECRET (eventos sintéticos).
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRICE_PRO: "${STRIPE_PRICE_PRO:-}"
      STRIPE_PRICE_TEAM: "${STRIPE_PRICE_TEAM:-}"
      DUNNING_GRACE_SEC: "${DUNNING_GRACE_SEC:-}"
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost:3000}"
      # M4.1: gate de merge — exigir revisão humana (false = auto-merge)
      MERGE_REQUIRE_HUMAN: "${MERGE_REQUIRE_HUMAN:-}"
      # M6.2: exige JWT (fecha o fallback dev "demo owner"). default off p/ as demos.
      REQUIRE_AUTH: "${REQUIRE_AUTH:-}"
      # produção: SEED_DEMO=false não cria o usuário/org demo. default (vazio) = semeia.
      SEED_DEMO: "${SEED_DEMO:-}"
      # Superadmin: lista de e-mails separados por vírgula (recebem role "superadmin" no login).
      SUPERADMIN_EMAILS: "${SUPERADMIN_EMAILS:-demo@apifor.dev}"
      # TTL do JWT em minutos (login/register). default 720 (12h).
      TOKEN_TTL_MIN: "${TOKEN_TTL_MIN:-720}"
      # TLS no REST/SSE (opt-in). REST_TLS=true emite cert da CA interna; ou
      # REST_TLS_CERT/REST_TLS_KEY p/ cert próprio. default (vazio) = HTTP (dev).
      REST_TLS: "${REST_TLS:-}"
      REST_TLS_HOSTS: "${REST_TLS_HOSTS:-}"
      # Sidecar que dirige o `claude setup-token` (OAuth assinatura Claude).
      AUTH_SIDECAR_URL: "http://auth-sidecar:8090"
    volumes:
      - cadata:/var/lib/cerebro       # CA própria persistente (mTLS)
    depends_on:
      migrate: { condition: service_completed_successfully }
    ports: ["8088:8080", "9090:9090"]

  # OAuth da assinatura Claude: roda o `claude setup-token` num PTY e grava as
  # credenciais por conta em /data/contas/<id> (volume `contas`, compartilhado
  # com o executor p/ os workers usarem CLAUDE_CONFIG_DIR=/data/contas/<id>).
  auth-sidecar:
    build: ./auth-sidecar
    environment:
      CONTAS_DIR: "/data/contas"
      PORT: "8090"
    volumes:
      - contas:/data/contas

  executor:
    build: ./executor
    environment:
      CEREBRO_HTTP: "http://cerebro:8080"
      CEREBRO_GRPC: "https://cerebro:9090"
      APIFOR_HOME: "/var/lib/apifor"
      APIFOR_WORKDIR: "/workspace"
      # M3.1: pede N leases extras no boot p/ demonstrar a trava max_workers (0 = nenhum)
      APIFOR_EXTRA_LEASES: "${APIFOR_EXTRA_LEASES:-0}"
      # M4.1: step de teste — APIFOR_TEST_CMD roda comando real; APIFOR_TEST_FAIL=1 força falha
      APIFOR_TEST_CMD: "${APIFOR_TEST_CMD:-}"
      APIFOR_TEST_FAIL: "${APIFOR_TEST_FAIL:-}"
      # chave Anthropic opcional: se ausente, o relay usa o stub determinístico.
      # injete a real via IPC (make secret KEY=sk-...), nunca via env do cérebro.
    volumes:
      - vaultdata:/var/lib/apifor        # cofre local persistente
      - ./sample:/workspace:ro           # refs de contexto (lidas LOCALMENTE)
      - gitremotes:/remotes              # remote git local p/ a demo do M2.2
      - contas:/data/contas:ro           # credenciais Claude por conta (CLAUDE_CONFIG_DIR)
    depends_on:
      cerebro: { condition: service_started }

volumes:
  pgdata:
  vaultdata:
  gitremotes:
  cadata:
  contas:
