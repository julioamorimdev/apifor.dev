name: release-desktop

# Builda os instaladores do app desktop (Linux/macOS/Windows) + artefatos de
# auto-update ao publicar uma tag v*. Roda nos runners do GitHub (toolchain Tauri).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: deps do Linux (webkit/Tauri)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: ${{ matrix.target }} }

      - name: build do executor (sidecar)
        run: |
          cargo build --release --manifest-path app/executor/Cargo.toml --target ${{ matrix.target }}
          mkdir -p app/desktop/src-tauri/bin
          # Tauri espera o sidecar nomeado pelo target-triple
          cp "app/executor/target/${{ matrix.target }}/release/executor$([[ '${{ matrix.os }}' == 'windows-latest' ]] && echo .exe)" \
             "app/desktop/src-tauri/bin/apifor-executor-${{ matrix.target }}$([[ '${{ matrix.os }}' == 'windows-latest' ]] && echo .exe)"
        shell: bash

      - name: instala CLI do Tauri
        run: cd app/desktop && npm install

      - name: build do dashboard (export estático)
        run: cd app/dashboard && npm install && NEXT_EXPORT=1 NEXT_PUBLIC_API_BASE="${{ vars.APIFOR_CEREBRO_URL || 'https://api.apifor.dev' }}" npm run build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # assinatura do updater (gere com `tauri signer generate`)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "apifor ${{ github.ref_name }}"
          releaseDraft: true
          args: --target ${{ matrix.target }}
